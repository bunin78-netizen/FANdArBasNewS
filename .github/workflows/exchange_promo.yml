name: Exchange Referral Post (Every 3 Days)

on:
  schedule:
    - cron: '0 10 */3 * *'  # Every 3 days at 10:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-exchange-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies (fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PROMO_TERMINAL_NAME: ${{ secrets.PROMO_TERMINAL_NAME }}
          PROMO_LINK: ${{ secrets.PROMO_LINK }}
          PROMO_SLOGAN: ${{ secrets.PROMO_SLOGAN }}
        run: |
          printf "TELEGRAM_BOT_TOKEN=%s\n" "$TELEGRAM_BOT_TOKEN" > .env
          printf "TELEGRAM_CHANNEL_ID=%s\n" "$TELEGRAM_CHANNEL_ID" >> .env
          printf "PROMO_TERMINAL_NAME=%s\n" "$PROMO_TERMINAL_NAME" >> .env
          printf "PROMO_LINK=%s\n" "$PROMO_LINK" >> .env
          printf "PROMO_SLOGAN=%s\n" "$PROMO_SLOGAN" >> .env

      - name: Post exchange referral links
        run: python post_exchanges.py
